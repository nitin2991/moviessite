<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:#050816;color:white;text-align:center;font-family:sans-serif}

img{width:90%;border-radius:15px;margin-top:20px}

.btn{
display:block;margin:12px auto;width:85%;
padding:14px;border-radius:30px;
background:linear-gradient(45deg,#6a5cff,#ff4ecd);
color:white;text-decoration:none
}
</style>
</head>

<body>

<img src="{{ m.poster }}">
<h3>{{ m.name }}</h3>

<a class="btn" href="{{ m.link_480 }}">480p [{{ m.size_480 }}]</a>
<a class="btn" href="{{ m.link_720 }}">720p [{{ m.size_720 }}]</a>
<a class="btn" href="{{ m.link_1080 }}">1080p [{{ m.size_1080 }}]</a>

</body>
</html>
