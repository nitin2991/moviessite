<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<form method="POST">
<input name="name" placeholder="Name">
<input name="poster" placeholder="Poster">
<input name="link480" placeholder="480 link">
<input name="link720" placeholder="720 link">
<input name="link1080" placeholder="1080 link">
<button class="btn">Add Movie</button>
</form>

{% for m in movies %}
<div class="movie-row">
<div>{{m.name}}</div>
<div class="actions">
<a class="edit-btn" href="/edit/{{loop.index0}}">Edit</a>
<a class="delete-btn" href="/delete/{{loop.index0}}">Delete</a>
</div>
</div>
{% endfor %}
