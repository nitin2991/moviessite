<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {margin:0;background:#0b0f1a;color:white;font-family:Arial}

.header {
display:flex;justify-content:space-between;
padding:12px;background:linear-gradient(90deg,#1a1f3c,#2a0f4c)
}

.logo {color:#ff3c3c;font-size:20px;font-weight:bold}

.search {padding:6px;border-radius:20px;border:none}

.container {
display:grid;grid-template-columns:repeat(2,1fr);
gap:15px;padding:15px
}

.card {background:#111827;border-radius:15px;overflow:hidden}

.card img {width:100%;height:230px;object-fit:cover}

.title {padding:10px;font-size:14px}

.btn {
display:block;margin:5px;text-align:center;
padding:8px;border-radius:20px;
background:linear-gradient(45deg,#6a5cff,#ff4ecd);
color:white;text-decoration:none
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🍿 Latest Movies 🎥</div>

<form method="GET">
<input name="q" value="{{ query }}" class="search" placeholder="Search...">
</form>
</div>

<h3 style="text-align:center;">Total Movies: {{ total }}</h3>

<div class="container">
{% for m in movies %}
<div class="card">
<img src="{{ m.poster }}">
<div class="title">{{ m.name }}</div>

<a class="btn" href="{{ m.link_720 }}">720p</a>
<a class="btn" href="{{ m.link_1080 }}">1080p</a>
</div>
{% endfor %}
</div>

</body>
</html>
