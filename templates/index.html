<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#0b1220;color:white;font-family:sans-serif}

/* HEADER */
.header{
display:flex;justify-content:space-between;align-items:center;
padding:12px 18px;
background:linear-gradient(90deg,#0f0c29,#302b63,#24243e);
position:sticky;top:0;z-index:1000
}
.logo{display:flex;align-items:center;gap:8px}
.logo img{height:35px}
.logo span{color:#ff4d4d;font-weight:bold;font-size:18px}

.search{padding:7px;border-radius:20px;border:none;width:140px}

/* GRID */
.container{
display:grid;grid-template-columns:repeat(2,1fr);
gap:15px;padding:15px
}
.card{background:#111827;border-radius:15px;overflow:hidden}
.card img{width:100%;height:230px;object-fit:cover}
.name{padding:10px;font-size:13px}
</style>
</head>

<body>

<div class="header">
<div class="logo">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQCq0eh-pykatLtKLVqzjeLKhtKk0WPbHslSWcZ8FzF_j92YYvD4mqlDovu&s=10">
<span>MoviesDrive</span>
</div>

<form>
<input name="q" value="{{ query }}" class="search" placeholder="Search">
</form>
</div>

<h3 style="text-align:center">Total Movies: {{ total }}</h3>

<div class="container">
{% for m in movies %}
<div class="card">
<a href="/movie/{{ loop.index0 }}">
<img src="{{ m.poster }}">
</a>
<div class="name">{{ m.name }}</div>
</div>
{% endfor %}
</div>

</body>
</html>
